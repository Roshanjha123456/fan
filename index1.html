<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;

    }
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color:#050505;
    }
    .center{
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
       
    }
    .outer-ring{
        width: 250px;
        height: 250px;
        border-radius: 50%;
        border-top:8px solid rgb(109, 252, 0);
        border-bottom:8px solid rgb(236, 8, 8);
        border-left:8px solid transparent;
        border-right:8px solid transparent;
        position: absolute;
        animation: rototering 2s linear infinite;


    }
    .outer1-ring{
        width: 300px;
        height: 300px;
        border-radius: 50%;
        border-top:8px solid rgba(118, 0, 252, 0.596);
        border-bottom:8px solid rgb(8, 236, 224);
        border-left:8px solid transparent;
        border-right:8px solid transparent;
        position: absolute;
        animation: rototering 2s linear infinite reverse;
    }
    .inner{
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border-top:8px solid rgb(18, 205, 238);
        border-bottom:8px solid rgb(231, 55, 202);
        border-left:8px solid transparent;
        border-right:8px solid transparent;
        position: absolute;
        animation: rototering 2s linear infinite;

        

    }
    .dot{
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background-color: tomato;
        animation: rototering 2s infinite;
    }
    .middle-ring{
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border-top:8px solid rgb(250, 249, 249);
        border-bottom:8px solid rgb(255, 254, 254);
        border-left:8px solid transparent;
        border-right:8px solid transparent;
        position: absolute;
        animation: rototering 2s linear infinite reverse;
    
    }
    @keyframes rototering{
        0%{
            transform:rotate(0deg) scale(1);

        }
        100%{
        transform:rotate(360deg) scale(2.2);
            
        }
   
    }
</style>
<body>
    <div class="center">
     <div class="outer-ring"></div>
     <div class="outer1-ring"></div>
            <div class="middle-ring"></div>
            <div class="inner"></div>
            <div class="dot"></div>
    </div>
</body>
</html>
